<!DOCTYPE html>
<html>
    <head>
        <title>Esempio di funzione JavaScript</title>
    </head>

    <body>

        <h2>What Can JavaScript Do?</h2>

        <p id="id1">JavaScript can change HTML content.</p>

        <button type="button" id="btn1" onclick="cambiaTesto()">Click Me!</button>
        <button type="button" id="btn2">Cliccami!</button>
        
        <p>In this case JavaScript changes the value of the src (source) attribute of an image.</p>

        <button type="button" onclick="accendiLuce()">Turn on the light</button>

        <img id="myImage" style="width:150px; height: 150px;">

        <button type="button" onclick="spegniLuce()">Turn off the light</button>

        <br>
        <br>
        <br>
        <button><a href="/index.html" style="text-decoration: none; color: royalblue;">Torna alla homepage</a></button>


    </body>

    <script>

        let button = document.getElementById("btn2");

        function saluta(){
            console.log("Ciao Mondo!")
        }

        button.addEventListener("click",saluta);

        // Questa funzione verrà chiamata quando l'utente clicca il bottone
        function cambiaTesto() {
            document.getElementById("id1").innerHTML = "Hello JavaScript!";
        }

        function accendiLuce() {
            document.getElementById("myImage").src = "/pagine/es_js_1/images/pic_bulbon.png";
        }

        // Funzione che spegne la "lampadina"
        function spegniLuce() {
            document.getElementById("myImage").src = "images/pic_bulboff.png";
        }
    </script>
</html>
